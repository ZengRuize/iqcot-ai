<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620">
<rect width="100%" height="100%" fill="white"/>
<style>text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#111} .axis{stroke:#111;stroke-width:1.4} .grid{stroke:#ddd;stroke-width:1} .thin{stroke:#555;stroke-width:1.2} .main{stroke:#1f4e79;stroke-width:2.4;fill:none} .alt{stroke:#a23b2a;stroke-width:2.4;fill:none} .green{stroke:#2d6a4f;stroke-width:2.4;fill:none} .dash{stroke-dasharray:6 4}</style>
<defs><marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L10,4 L0,8 Z" fill="#555"/></marker></defs>
<text x="490" y="42" font-size="24" text-anchor="middle" font-weight="bold">Integral-event kernel view of IQCOT</text>
<rect x="70" y="120" width="230" height="90" rx="8" fill="#eef5fb" stroke="#333" stroke-width="1.2" />
<text x="185" y="152" font-size="17" text-anchor="middle" font-weight="bold">Power stage memory</text>
<text x="185" y="180" font-size="15" text-anchor="middle" font-weight="normal">xk, past events</text>
<rect x="380" y="105" width="240" height="120" rx="8" fill="#fff8e8" stroke="#333" stroke-width="1.2" />
<text x="500" y="142" font-size="17" text-anchor="middle" font-weight="bold">IQCOT area event</text>
<text x="500" y="172" font-size="16" text-anchor="middle" font-weight="normal">∫[vc(t) - Ri iL(t)]dt = Λ</text>
<text x="500" y="199" font-size="14" text-anchor="middle" font-weight="normal">moving-boundary linearization</text>
<rect x="715" y="120" width="200" height="90" rx="8" fill="#eef7ef" stroke="#333" stroke-width="1.2" />
<text x="815" y="152" font-size="17" text-anchor="middle" font-weight="bold">Event time</text>
<text x="815" y="180" font-size="15" text-anchor="middle" font-weight="normal">τk+1, ΔTk, duty</text>
<line x1="300" y1="165" x2="380" y2="165" class="thin" marker-end="url(#arrow)"/>
<line x1="620" y1="165" x2="715" y2="165" class="thin" marker-end="url(#arrow)"/>
<line x1="815" y1="210" x2="185" y2="255" class="thin" marker-end="url(#arrow)"/>
<text x="485" y="255" font-size="14" text-anchor="middle" font-weight="normal">state reset and memory feedback</text>
<rect x="105" y="365" width="770" height="115" rx="8" fill="#f7f7f7" stroke="#333" stroke-width="1.2" />
<text x="490" y="400" font-size="24" text-anchor="middle" font-weight="bold">[He z - Hs + K(z)] Tau(z) = UA(z)</text>
<text x="490" y="432" font-size="15" text-anchor="middle" font-weight="normal">K(z) collects power-stage and control-chain memory; K(1)=Hs-He enforces time-shift invariance.</text>
<text x="490" y="462" font-size="15" text-anchor="middle" font-weight="normal">UA contains Λ, CT, VTH, gm, Ri, delay and area-noise perturbations.</text>
</svg>